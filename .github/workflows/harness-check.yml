name: harness-check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  harness-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test --if-present

      - name: Privacy check
        run: node scripts/harness/privacy-check.mjs
